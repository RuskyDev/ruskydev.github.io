<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="icon" type="image/x-icon" href="../assets/logo.png">
  <script src="../libs/stor.js"></script>
  <title>RuskyDev</title>
</head>
<body>
  <h1>Welcome to Stor.js Testing Website!</h1>
  <input type="text" id="myInput">
  <input type="text" id="myKey" placeholder="Enter a key">
  <button onclick="saveData()">Save Data</button>
  <button onclick="retrieveData()">Retrieve Data</button>
  <script>
    function saveData() {
      var input = document.getElementById('myInput').value;
      var key = document.getElementById('myKey').value;
      Stor.set(key, input, {expires: 60});
      console.log('Data saved');
    }

    function retrieveData() {
      var key = document.getElementById('myKey').value;
      var data = Stor.get(key, 'No data found');
      console.log('Data retrieved:', data);
      alert(data);
    }
  </script>
</body>
</html>
