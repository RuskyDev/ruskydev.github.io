<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thanks!</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.1.4/tailwind.min.css">
  <style>
    body {
      background-color: black;
      color: white;
    }

    .container {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .content {
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      font-weight: bold;
      margin-bottom: 1rem;
    }

    a {
      color: white;
    }

    @media (min-width: 768px) {
      /* For desktop */
      .container {
        justify-content: flex-start;
        align-items: flex-start;
      }

      .content {
        max-width: 600px;
        margin-top: 100px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="content">
      <h1 class="text-center mb-4">Thanks!</h1>
      <p class="mb-4">The form was submitted successfully.</p>
      <p class="mb-4"><a href="../index.html">Go back to homepage</a></p>
    </div>
  </div>
</body>

</html>
