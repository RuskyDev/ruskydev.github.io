<!DOCTYPE html>
<html>
<head>
  <title>Disk Space Checker</title>
  <script>
    function checkDiskSpace() {
      if (navigator.storage && navigator.storage.estimate) {
        navigator.storage.estimate().then(function(estimate) {
          var usage = estimate.usage;
          var quota = estimate.quota;

          var usageText = formatBytes(usage);
          var quotaText = formatBytes(quota);

          document.getElementById('usage').textContent = 'Usage: ' + usageText;
          document.getElementById('quota').textContent = 'Quota: ' + quotaText;
        });
      } else {
        document.getElementById('usage').textContent = 'Storage estimate API is not supported.';
      }
    }

    function formatBytes(bytes, decimals = 2) {
      if (bytes === 0) return '0 Bytes';
      var k = 1024;
      var dm = decimals < 0 ? 0 : decimals;
      var sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB', 'PB', 'EB', 'ZB', 'YB'];
      var i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
    }
  </script>
</head>
<body onload="checkDiskSpace()">
  <h1>Disk Space Checker</h1>
  <p id="usage">Checking disk space...</p>
  <p id="quota"></p>
</body>
</html>
