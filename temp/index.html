<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Under Maintenance</title>
  <style>
    body {
      background-color: black;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .maintenance-container {
      text-align: center;
    }

    .maintenance-text {
      font-size: 24px;
      font-weight: bold;
    }

    .maintenance-message {
      font-size: 16px;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="maintenance-container">
    <div class="maintenance-text">Site Under Maintenance</div>
    <div class="maintenance-message">We are currently performing some updates. Please check back soon.</div>
  </div>
</body>

</html>
